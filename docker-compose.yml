services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    command: pnpm --filter web dev --hostname 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    environment:
      NODE_ENV: development
      INTERNAL_API_URL: http://api:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_healthy

  web-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    command: pnpm --filter web test
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      NODE_ENV: test
      CI: "true"

  api:
    build:
      context: ./apps/api
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api_venv:/app/.venv
    environment:
      DATABASE_URL: postgresql+asyncpg://fintrack:fintrack@db:5432/fintrack
      JWT_SECRET: dev-secret-change-in-prod
      DEV_SEED: "true"
      DEV_SEED_EMAIL: localtest@example.com
      DEV_SEED_PASSWORD: test123456
      DEV_SEED_NAME: Local Test User
      CORS_ORIGINS: '["http://localhost:3000"]'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  api-test:
    profiles: ["test"]
    build:
      context: ./apps/api
      target: dev
    command: uv run pytest
    volumes:
      - ./apps/api:/app
      - api_venv:/app/.venv
    environment:
      JWT_SECRET: test-secret

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
      POSTGRES_DB: fintrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  web_node_modules:
  web_next:
  api_venv:
