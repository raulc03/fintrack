<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="ft-icon-title">
  <title id="ft-icon-title">FinTrack</title>
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#18181b"/>
  <!-- Growth chart bars -->
  <rect x="14" y="38" width="8" height="14" rx="2" fill="url(#icon-grad)" opacity="0.5"/>
  <rect x="26" y="28" width="8" height="24" rx="2" fill="url(#icon-grad)" opacity="0.7"/>
  <rect x="38" y="18" width="8" height="34" rx="2" fill="url(#icon-grad)"/>
  <!-- Upward trend line -->
  <polyline points="14,40 22,34 30,28 38,20 50,12" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polyline points="44,12 50,12 50,18" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
