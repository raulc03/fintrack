<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64" role="img" aria-labelledby="ft-logo-title">
  <title id="ft-logo-title">FinTrack Logo</title>
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g id="icon">
    <rect x="2" y="2" width="60" height="60" rx="14" fill="#18181b"/>
    <!-- Growth bars -->
    <rect x="14" y="38" width="8" height="14" rx="2" fill="url(#logo-grad)" opacity="0.5"/>
    <rect x="26" y="28" width="8" height="24" rx="2" fill="url(#logo-grad)" opacity="0.7"/>
    <rect x="38" y="18" width="8" height="34" rx="2" fill="url(#logo-grad)"/>
    <!-- Trend line with arrow -->
    <polyline points="14,40 22,34 30,28 38,20 50,12" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="44,12 50,12 50,18" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g id="wordmark">
    <text x="74" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#fafafa" letter-spacing="-0.5">
      Fin<tspan fill="#22c55e">Track</tspan>
    </text>
    <text x="74" y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#a1a1aa" letter-spacing="0.5">
      Personal Finance
    </text>
  </g>
</svg>
